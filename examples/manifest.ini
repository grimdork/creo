; Package manifest for Linux packages.
;
; Place this file as "manifest.ini" in your project root alongside fiat.
; Deb/rpm targets read it automatically.  Archive and brew targets also
; consult it for extra files and metadata.
;
; Target-level properties in the fiat file override manifest values.

[package]
maintainer=Developer <dev@example.com>
vendor=Example Corp
homepage=https://github.com/user/project
license=MIT
section=contrib
priority=extra
description=My awesome project

; Runtime dependencies (deb: Depends, rpm: Requires)
[depends]
libc6 = >=2.31

; Optional packages
[recommends]
ca-certificates

[files]
; dst = src  (install path = source file relative to fiat dir)
/usr/share/doc/$PROJECT/FAQ.md = FAQ.md

; Pre/post installation scripts
[scripts]
; postinstall = scripts/postinst.sh

; Architecture-specific overrides — values here replace the base manifest
; for the matching architecture.
[arch:arm64]
depends = libc6 >=2.35
